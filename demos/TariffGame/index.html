<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關稅遊戲 - 貿易策略模擬器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>關稅遊戲</h1>
            <div class="game-info">
                <div id="day">第 <span id="current-day">1</span> 天</div>
                <div id="money">資金: $<span id="current-money">10000</span></div>
            </div>
        </header>

        <div class="main-content">
            <div class="tariff-info">
                <h2>當前關稅情況</h2>
                <div id="tariff-display">
                    <div class="product-tariff">
                        <span class="product-name">商品A</span>: <span id="tariff-a">10%</span>
                    </div>
                    <div class="product-tariff">
                        <span class="product-name">商品B</span>: <span id="tariff-b">15%</span>
                    </div>
                    <div class="product-tariff">
                        <span class="product-name">商品C</span>: <span id="tariff-c">5%</span>
                    </div>
                </div>
                <div class="tariff-news">
                    <h3>關稅預測</h3>
                    <p id="tariff-forecast">未來幾天關稅可能會上漲...</p>
                </div>
            </div>

            <div class="inventory-section">
                <h2>庫存管理</h2>
                <div class="inventory-display">
                    <div class="product-inventory">
                        <span class="product-name">商品A</span>: <span id="inventory-a">0</span> 個
                        <div class="product-price">當前價格: $<span id="price-a">100</span></div>
                    </div>
                    <div class="product-inventory">
                        <span class="product-name">商品B</span>: <span id="inventory-b">0</span> 個
                        <div class="product-price">當前價格: $<span id="price-b">150</span></div>
                    </div>
                    <div class="product-inventory">
                        <span class="product-name">商品C</span>: <span id="inventory-c">0</span> 個
                        <div class="product-price">當前價格: $<span id="price-c">80</span></div>
                    </div>
                </div>
            </div>

            <div class="action-section">
                <h2>行動</h2>
                <div class="action-buttons">
                    <div class="buy-section">
                        <h3>進貨</h3>
                        <div class="product-action">
                            <label for="buy-a">商品A:</label>
                            <input type="number" id="buy-a" min="0" value="0">
                            <button class="buy-btn" data-product="a">購買</button>
                        </div>
                        <div class="product-action">
                            <label for="buy-b">商品B:</label>
                            <input type="number" id="buy-b" min="0" value="0">
                            <button class="buy-btn" data-product="b">購買</button>
                        </div>
                        <div class="product-action">
                            <label for="buy-c">商品C:</label>
                            <input type="number" id="buy-c" min="0" value="0">
                            <button class="buy-btn" data-product="c">購買</button>
                        </div>
                    </div>

                    <div class="sell-section">
                        <h3>銷售</h3>
                        <div class="product-action">
                            <label for="sell-a">商品A:</label>
                            <input type="number" id="sell-a" min="0" value="0">
                            <button class="sell-btn" data-product="a">銷售</button>
                        </div>
                        <div class="product-action">
                            <label for="sell-b">商品B:</label>
                            <input type="number" id="sell-b" min="0" value="0">
                            <button class="sell-btn" data-product="b">銷售</button>
                        </div>
                        <div class="product-action">
                            <label for="sell-c">商品C:</label>
                            <input type="number" id="sell-c" min="0" value="0">
                            <button class="sell-btn" data-product="c">銷售</button>
                        </div>
                    </div>
                </div>

                <div class="next-day">
                    <button id="next-day-btn">進入下一天</button>
                </div>
            </div>
        </div>

        <div class="game-log">
            <h2>遊戲日誌</h2>
            <div id="log-container"></div>
        </div>
    </div>

    <div id="game-over-modal" class="modal">
        <div class="modal-content">
            <h2>遊戲結束!</h2>
            <p>您最終的資金: $<span id="final-money">0</span></p>
            <button id="restart-btn">重新開始</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
